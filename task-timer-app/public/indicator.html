<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Индикатор задач</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: transparent;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    #indicator-container {
      display: flex;
      gap: 16px;
      padding: 20px;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .task-indicator {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      position: relative;
      box-shadow: 
        0 4px 20px rgba(0, 0, 0, 0.3),
        0 0 40px currentColor;
      animation: float 4s ease-in-out infinite;
      cursor: pointer;
    }

    .task-indicator::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: inherit;
      opacity: 0.7;
      animation: pulse 3s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }

    .task-name {
      position: absolute;
      bottom: -30px;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      color: currentColor;
      font-size: 11px;
      font-weight: 600;
      text-shadow: 0 0 10px rgba(0, 0, 0, 0.8);
      text-align: center;
      max-width: 100px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-10px);
      }
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
        opacity: 0.7;
      }
      50% {
        transform: scale(1.5);
        opacity: 0.4;
      }
      100% {
        transform: scale(2.2);
        opacity: 0;
      }
    }

    .empty-state {
      color: #8b92b8;
      text-align: center;
      font-size: 16px;
      padding: 40px;
    }

    .controls {
      position: fixed;
      top: 10px;
      right: 10px;
      display: flex;
      gap: 8px;
    }

    .control-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(18, 23, 46, 0.8);
      border: 1px solid rgba(0, 245, 255, 0.3);
      color: #00F5FF;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transition: all 0.3s ease;
    }

    .control-btn:hover {
      background: rgba(0, 245, 255, 0.2);
      box-shadow: 0 0 15px rgba(0, 245, 255, 0.5);
    }
  </style>
</head>
<body>
  <div class="controls">
    <button class="control-btn" onclick="toggleTransparency()" title="Прозрачность фона">◐</button>
    <button class="control-btn" onclick="window.close()" title="Закрыть">×</button>
  </div>
  
  <div id="indicator-container">
    <div class="empty-state">Нет активных задач</div>
  </div>

  <script>
    let isTransparent = false;

    function toggleTransparency() {
      isTransparent = !isTransparent;
      document.body.style.background = isTransparent ? 'transparent' : 'rgba(10, 14, 39, 0.95)';
    }

    function updateIndicators() {
      try {
        const username = localStorage.getItem('sphereTimerUser');
        if (!username) {
          showEmpty();
          return;
        }

        const userData = JSON.parse(username);
        const tasksKey = `tasks_${userData.username}`;
        const tasksData = localStorage.getItem(tasksKey);
        
        if (!tasksData) {
          showEmpty();
          return;
        }

        const tasks = JSON.parse(tasksData);
        const activeTasks = tasks.filter(task => task.startTime);

        if (activeTasks.length === 0) {
          showEmpty();
          return;
        }

        const container = document.getElementById('indicator-container');
        container.innerHTML = activeTasks.map(task => `
          <div class="task-indicator" style="background-color: ${task.color}; color: ${task.color}">
            <div class="task-name">${escapeHtml(task.name)}</div>
          </div>
        `).join('');

      } catch (error) {
        console.error('Error updating indicators:', error);
        showEmpty();
      }
    }

    function showEmpty() {
      const container = document.getElementById('indicator-container');
      container.innerHTML = '<div class="empty-state">Нет активных задач</div>';
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Обновление каждые 500ms
    setInterval(updateIndicators, 500);
    
    // Начальное обновление
    updateIndicators();

    // Установка прозрачного фона по умолчанию
    document.body.style.background = 'rgba(10, 14, 39, 0.95)';

    // Обработка сообщений от основного приложения
    window.addEventListener('storage', updateIndicators);
  </script>
</body>
</html>
